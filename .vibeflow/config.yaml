# VibeFlow Project Configuration
# Auto-generated by init.sh — customize as needed

project:
  name: "trace-recap"
  language: "node"
  framework: "next"

commands:
  build: "next build"
  test: "npm test"
  lint: "eslint"
  start: "next start"

agents:
  architect:
    engine: "claude-code"
    model: "claude-opus-4-6"
  implementer:
    engine: "codex-cli"
    model: "gpt-5.4"
  reviewer:
    engine: "claude-code"
    model: "claude-opus-4-6"
  red_team:
    engine: "claude-code"
    model: "claude-opus-4-6"

monitoring:
  healthcheck_interval_minutes: 10
  timeout_minutes: 30
  max_retries: 3

# Adversarial review configuration
review:
  # L1: standard cross-review (always on)
  l1:
    enabled: true
    max_rounds: 3
  # L2: red team adversarial testing
  l2:
    enabled: true
    min_lines_changed: 50
    min_files_changed: 2
    always_on_paths:
      - "auth/"
      - "api/"
      - "payments/"
      - "middleware/"
  # L3: MAGI design debate (three-perspective)
  l3:
    enabled: true
    min_lines_changed: 200
    trigger_on_architecture: true
    # Architecture indicators: new module, new API route, schema change, new dependency
    architecture_patterns:
      - "new file in src/modules/"
      - "schema migration"
      - "new API endpoint"
      - "package.json dependency added"

# Dashboard
dashboard:
  enabled: true
  output_dir: ".vibeflow/dashboard"
  auto_refresh_seconds: 30

autonomy:
  auto:
    - run_tests
    - lint_fix
    - create_branch
    - commit
  notify:
    - create_file
    - add_dependency
    - create_pr
    - merge_to_main
  approve:
    - delete_file
    - modify_schema
    - deploy

worktrees:
  base_path: "/tmp/vibeflow-worktrees"
  cleanup_on_merge: true

# Discord channel for all project notifications
# Set this so agents/crons send updates to the right place
notifications:
  discord_channel: "1487136814312460389"

# Webhook configuration
hooks:
  url: "http://127.0.0.1:18789/hooks/agent"
  token: "3acb221d2ba3a9e601d0088292d5054953bd105412aa8ebda9376ed8a0b3dd34"

# Cost estimation — rates per agent type (USD per minute of execution)
cost:
  models:
    codex:
      per_minute_usd: 0.03
      note: "Codex CLI $200/mo estimate"
    claude-code:
      per_minute_usd: 0.05
      note: "CC $200/mo estimate"
    wanwan:
      per_minute_usd: 0.0
      note: "Manual work, no API cost"
  currency: "USD"

ci: ""
existing_agent_config:
  claude_md: true
  agents_md: true
